<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healing BGM Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <!-- SortableJS for flawless mobile drag & drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
    <div class="aurora-bg"></div>
    <div class="noise-overlay"></div>

    <div class="app-container">
        <header>
            <h1>Healing BGM Maker</h1>
            <p>アンビエント・シンセサイザーの調べ</p>
            <div style="margin-top: 1rem;">
                <a href="instructions.html" class="btn secondary" style="text-decoration: none; display: inline-flex; align-items: center; gap: 6px; padding: 0.4rem 1rem; font-size: 0.85rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                    操作説明
                </a>
            </div>
        </header>

        <main>
            <section class="visualizer-section glass-panel">
                <canvas id="visualizerCanvas"></canvas>
                <div class="visualizer-overlay-text">AURORA EQUALIZER</div>
            </section>

            <div class="editor-grid">
                <section class="library-section glass-panel">
                    <h2>Phrases Library</h2>
                    <p class="section-desc">追加したいサウンドをクリックしてください</p>
                    <button id="todaysFeelingBtn" class="btn primary" style="width: 100%; margin-bottom: 1rem; background: linear-gradient(45deg, #b4f8ff, #e0b4ff); color: var(--bg-dark); font-weight: 600;">✨ Today's Feeling</button>
                    <div id="phrasesList" class="phrases-list">
                        <!-- JSで動的に追加されます -->
                    </div>
                </section>

                <section class="timeline-section glass-panel">
                    <div class="timeline-header">
                        <h2>Timeline / Chapters</h2>
                        <div class="playback-controls">
                            <button id="playBtn" class="btn primary">Play</button>
                            <button id="stopBtn" class="btn secondary">Stop</button>
                            <button id="clearBtn" class="btn danger">Clear</button>
                        </div>
                    </div>
                    
                    <div class="timeline-settings">
                        <div class="setting-item">
                            <label>Length: <span id="durationVal">10s</span></label>
                            <input type="range" id="durationSlider" min="10" max="30" step="10" value="10">
                        </div>
                        <div class="setting-item">
                            <label class="toggle-label">
                                <input type="checkbox" id="repeatToggle" checked>
                                <span class="toggle-text">Repeat All</span>
                            </label>
                        </div>
                    </div>

                    <div id="timelineContainer" class="timeline-container">
                        <div class="timeline-empty-msg">左のライブラリからフレーズを追加してください</div>
                        <!-- JSで章（Chapter）が追加されます -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
